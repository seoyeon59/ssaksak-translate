name: Build & Release Windows EXE

# 트리거:
#  1) v로 시작하는 태그 푸시 (예: git tag v1.0.0 && git push origin v1.0.0)
#  2) 수동 실행 (Actions 탭에서 "Run workflow" — version 입력하면 Release 생성)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: 1.0.0). 비워두면 빌드만 하고 Release는 안 만듦.'
        required: false
        default: ''

permissions:
  contents: write   # Release 생성에 필요

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywebview
        shell: pwsh

      - name: Download Korean font (NanumGothic, SIL OFL license)
        run: |
          New-Item -ItemType Directory -Force -Path fonts | Out-Null
          if (-not (Test-Path "fonts/NanumGothic.ttf")) {
            Invoke-WebRequest `
              -Uri "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Regular.ttf" `
              -OutFile "fonts/NanumGothic.ttf"
          }
          Get-ChildItem fonts
        shell: pwsh

      - name: Determine version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          if (-not $v) { $v = "0.0.0-dev" }
          Write-Host "Version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Build EXE (PyInstaller)
        run: ./build_exe.bat
        shell: cmd

      - name: Verify build output
        run: |
          if (-not (Test-Path "dist/SsakSsak/SsakSsak.exe")) {
            throw "빌드 실패: dist/SsakSsak/SsakSsak.exe 가 없습니다."
          }
          Get-ChildItem dist/SsakSsak | Select-Object -First 20
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $zipName = "SsakSsak-${{ steps.version.outputs.version }}-win64.zip"
          Compress-Archive -Path dist/SsakSsak/* -DestinationPath $zipName -Force
          Write-Host "Created: $zipName ($((Get-Item $zipName).Length / 1MB) MB)"
        shell: pwsh

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ steps.version.outputs.version }}

      - name: Make fixed-name copies for direct download links
        run: |
          Copy-Item "Output/SsakSsak-Setup-${{ steps.version.outputs.version }}.exe" "SsakSsak-Setup.exe"
          Copy-Item "SsakSsak-${{ steps.version.outputs.version }}-win64.zip" "SsakSsak.zip"
        shell: pwsh

      - name: Upload artifacts (always available, even without Release)
        uses: actions/upload-artifact@v4
        with:
          name: SsakSsak-${{ steps.version.outputs.version }}
          path: |
            SsakSsak-*-win64.zip
            Output/SsakSsak-Setup-*.exe
          retention-days: 30

      # ── Release 생성 조건: 태그 푸시 OR 수동실행 시 version 입력한 경우 ──
      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 싹싹번역 v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            SsakSsak-*-win64.zip
            Output/SsakSsak-Setup-*.exe
            SsakSsak-Setup.exe
            SsakSsak.zip
          body: |
            ## 다운로드

            - **`SsakSsak-Setup-${{ steps.version.outputs.version }}.exe`** — 설치 마법사 (권장, 시작 메뉴 등록 + 제거 지원)
            - **`SsakSsak-${{ steps.version.outputs.version }}-win64.zip`** — 압축 해제 후 바로 실행

            ## ⚠️ 첫 실행 시 SmartScreen 경고

            코드 사이닝 인증서가 없어 Windows에서 보호 화면이 뜰 수 있습니다.
            **"추가 정보(More info)" → "실행(Run anyway)"** 클릭하면 정상 실행됩니다.

            ## 시스템 요구사항
            - Windows 10/11 (64-bit)
            - RAM 8GB 이상
            - 디스크 여유 공간 약 5GB
